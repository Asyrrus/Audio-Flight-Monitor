<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Overflight Monitor</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root{
    --bg:#0b0d10; --panel:#14171c; --panel2:#1b1f26; --line:#262b33;
    --text:#e8eaed; --dim:#8b93a1; --accent:#4fd1c5; --warn:#f5a524; --danger:#f0555d; --good:#3ecf8e;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;padding:12px;}
  h1{font-size:16px;margin:0 0 4px;}
  .sub{color:var(--dim);font-size:12px;margin-bottom:14px;}
  .grid{display:grid;grid-template-columns:1fr;gap:12px;max-width:900px;margin:0 auto;}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px;}
  .status-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:12px;}
  .status-row .left{font-size:12px;color:var(--dim);}
  button{background:var(--panel2);color:var(--text);border:1px solid var(--line);border-radius:8px;padding:10px 14px;font-size:13px;cursor:pointer;flex:1;min-width:110px;}
  .status-row > div:last-child{display:flex;gap:8px;width:100%;}
  button:hover{border-color:var(--accent);}
  button.active{background:var(--accent);color:#04211d;border-color:var(--accent);}
  .hero{background:var(--panel2);border-radius:10px;padding:16px 12px;text-align:center;}
  .hero .eta{font-size:32px;font-weight:700;letter-spacing:-1px;}
  .hero .label{color:var(--dim);font-size:11px;text-transform:uppercase;letter-spacing:1px;margin-top:4px;}
  .hero .meta{margin-top:8px;font-size:12px;color:var(--dim);}
  .hero.imminent{background:rgba(240,85,93,0.15);}
  .hero.imminent .eta{color:var(--danger);}
  .hero.soon{background:rgba(245,165,36,0.12);}
  .hero.soon .eta{color:var(--warn);}
  .hero.clear .eta{color:var(--good);}
  .table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  table{width:100%;border-collapse:collapse;font-size:12px;min-width:480px;}
  th,td{text-align:left;padding:8px 6px;border-bottom:1px solid var(--line);white-space:nowrap;}
  th{color:var(--dim);font-weight:500;font-size:10px;text-transform:uppercase;}
  tr.imminent td{color:var(--danger);}
  tr.soon td{color:var(--warn);}
  .empty{color:var(--dim);font-size:13px;padding:8px 0;}
  .err{color:var(--danger);font-size:13px;}
  .foot{color:var(--dim);font-size:11px;margin-top:8px;}
  a{color:var(--accent);}
  @media (max-width:420px){
    .hero .eta{font-size:28px;}
    button{padding:10px 8px;font-size:12px;min-width:0;}
  }
</style>
</head>
<body>
<div class="grid">
  <div>
    <h1>Overflight Monitor</h1>
    <div class="sub">Live ADS-B via adsb.one · target: <span id="targetLabel">not set</span></div>
    <div class="panel" style="padding:10px;margin-bottom:12px;">
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <input id="locInput" type="text" placeholder="Coords, address, or place name" style="flex:1;min-width:180px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;color:var(--text);padding:10px;font-size:13px;">
        <button id="setLocBtn" style="flex:0 0 auto;">Set</button>
        <button id="gpsBtn" style="flex:0 0 auto;">Use my GPS</button>
        <button id="mapToggleBtn" style="flex:0 0 auto;">Hide map</button>
      </div>
      <div id="locStatus" class="foot" style="margin-top:6px;"></div>
      <div id="map" style="height:160px;border-radius:8px;margin-top:10px;"></div>
    </div>
  </div>

  <div class="panel">
    <div class="status-row">
      <div class="left" id="statusText">Loading…</div>
      <div>
        <button id="refreshBtn">Refresh now</button>
        <button id="autoBtn" class="active">Auto: ON</button>
      </div>
    </div>
    <div id="hero" class="hero clear">
      <div class="eta" id="heroEta">–</div>
      <div class="label" id="heroLabel">No aircraft tracking toward target</div>
      <div class="meta" id="heroMeta"></div>
    </div>
  </div>

  <div class="panel">
    <div class="table-wrap">
    <table>
      <thead>
        <tr><th>Callsign</th><th>Alt (ft)</th><th>ETA</th></tr>
      </thead>
      <tbody id="tbody"><tr><td colspan="3" class="empty">Waiting for data…</td></tr></tbody>
    </table>
    </div>
  </div>
</div>

<script>
let TARGET = null;
const BBOX_DEG = 0.5; // ~55km box around target — widen for more lead time
const CLOSE_THRESHOLD_M = 3000; // only list aircraft projected within 3km of target
const REFRESH_MS = 3000;

let autoOn = true;
let timer = null;

function toRad(d){ return d*Math.PI/180; }

function project(lat, lon){
  // flat-earth ENU meters relative to TARGET
  const dx = (lon - TARGET.lon) * 111320 * Math.cos(toRad(TARGET.lat));
  const dy = (lat - TARGET.lat) * 110540;
  return {x: dx, y: dy};
}

function fmtTime(sec){
  if (sec == null || !isFinite(sec)) return '–';
  const s = Math.round(sec);
  const sign = s < 0 ? '-' : '';
  const a = Math.abs(s);
  const m = Math.floor(a/60), r = a%60;
  return `${sign}${m}:${String(r).padStart(2,'0')}`;
}

function fmtDist(m){
  if (m == null) return '–';
  return m < 1000 ? `${Math.round(m)} m` : `${(m/1000).toFixed(1)} km`;
}

const RADIUS_NM = 25; // search radius around target — widen for more lead time (max 250)
const SOURCES = [
  (lat, lon, r) => `https://api.adsb.one/v2/point/${lat}/${lon}/${r}`,
  (lat, lon, r) => `https://api.airplanes.live/v2/point/${lat}/${lon}/${r}`
];

async function fetchStates(){
  let lastErr;
  for (const buildUrl of SOURCES) {
    try {
      const res = await fetch(buildUrl(TARGET.lat, TARGET.lon, RADIUS_NM));
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      return data.ac || [];
    } catch (e) {
      lastErr = e;
    }
  }
  throw lastErr || new Error('all sources failed');
}

function computeCandidates(aircraftList){
  const out = [];
  for (const s of aircraftList) {
    const callsign = (s.flight || '').trim() || s.r || s.hex || '—';
    const lat = s.lat, lon = s.lon;
    const altFt = typeof s.alt_baro === 'number' ? s.alt_baro : null;
    const gsKnots = s.gs;
    const track = s.track != null ? s.track : s.true_heading;
    if (lat == null || lon == null || gsKnots == null || track == null) continue;
    if (s.alt_baro === 'ground') continue;

    const velocity = gsKnots * 0.514444;
    const P = project(lat, lon);
    const vx = velocity * Math.sin(toRad(track));
    const vy = velocity * Math.cos(toRad(track));
    const vSq = vx*vx + vy*vy;
    if (vSq < 0.01) continue;

    let tStar = -(P.x*vx + P.y*vy) / vSq;
    const distNow = Math.hypot(P.x, P.y);

    const closeX = P.x + vx*tStar;
    const closeY = P.y + vy*tStar;
    const distMin = Math.hypot(closeX, closeY);

    if (tStar < -30) continue;
    if (distMin > CLOSE_THRESHOLD_M) continue;

    out.push({
      callsign,
      icao24: s.hex || '—',
      altFt,
      distNow,
      distMin,
      eta: tStar
    });
  }
  out.sort((a,b) => a.eta - b.eta);
  return out;
}

function render(candidates, errMsg){
  const tbody = document.getElementById('tbody');
  const statusText = document.getElementById('statusText');
  const hero = document.getElementById('hero');
  const heroEta = document.getElementById('heroEta');
  const heroLabel = document.getElementById('heroLabel');
  const heroMeta = document.getElementById('heroMeta');

  if (errMsg) {
    statusText.innerHTML = `<span class="err">${errMsg}</span>`;
  } else {
    statusText.textContent = `Last updated ${new Date().toLocaleTimeString()}`;
  }

  if (!candidates || candidates.length === 0) {
    tbody.innerHTML = `<tr><td colspan="3" class="empty">No aircraft currently projected over target</td></tr>`;
    hero.className = 'hero clear';
    heroEta.textContent = '–';
    heroLabel.textContent = 'No aircraft tracking toward target';
    heroMeta.textContent = '';
    return;
  }

  const rows = candidates.map(c => {
    const cls = c.eta < 120 ? 'imminent' : (c.eta < 300 ? 'soon' : '');
    return `<tr class="${cls}">
      <td>${c.callsign}</td>
      <td>${c.altFt ?? '–'}</td>
      <td>${fmtTime(c.eta)}</td>
    </tr>`;
  }).join('');
  tbody.innerHTML = rows;

  const top = candidates[0];
  heroEta.textContent = fmtTime(top.eta);
  heroMeta.textContent = `${top.callsign} · closest pass ${fmtDist(top.distMin)} · ${top.altFt ?? '?'} ft`;

  if (top.eta < 120) {
    hero.className = 'hero imminent';
    heroLabel.textContent = 'Imminent overflight';
  } else if (top.eta < 300) {
    hero.className = 'hero soon';
    heroLabel.textContent = 'Approaching';
  } else {
    hero.className = 'hero clear';
    heroLabel.textContent = 'Tracked, not close yet';
  }
}

async function refresh(){
  if (!TARGET) {
    render([], null);
    document.getElementById('statusText').textContent = 'Set a location to begin.';
    return;
  }
  try {
    const states = await fetchStates();
    const candidates = computeCandidates(states);
    render(candidates, null);
  } catch (e) {
    render([], `Fetch failed: ${e.message}. Try again shortly.`);
  }
}

function scheduleAuto(){
  if (timer) clearInterval(timer);
  if (autoOn) timer = setInterval(refresh, REFRESH_MS);
}

document.getElementById('refreshBtn').addEventListener('click', refresh);
document.getElementById('autoBtn').addEventListener('click', (e) => {
  autoOn = !autoOn;
  e.target.textContent = `Auto: ${autoOn ? 'ON' : 'OFF'}`;
  e.target.classList.toggle('active', autoOn);
  scheduleAuto();
});

async function geocode(query){
  const url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(query)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('geocoding failed');
  const data = await res.json();
  if (!data.length) throw new Error('no match found');
  return { lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon), label: data[0].display_name };
}

function parseCoords(str){
  const m = str.match(/^\s*(-?\d+(?:\.\d+)?)\s*,\s*(-?\d+(?:\.\d+)?)\s*$/);
  if (!m) return null;
  const lat = parseFloat(m[1]), lon = parseFloat(m[2]);
  if (lat < -90 || lat > 90 || lon < -180 || lon > 180) return null;
  return { lat, lon };
}

let map, marker;

function initMap(){
  map = L.map('map', { zoomControl: false, attributionControl: false }).setView([20, 0], 2);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
}

document.getElementById('mapToggleBtn').addEventListener('click', (e) => {
  const mapEl = document.getElementById('map');
  const hidden = mapEl.style.display === 'none';
  mapEl.style.display = hidden ? 'block' : 'none';
  e.target.textContent = hidden ? 'Hide map' : 'Show map';
  if (hidden && map) setTimeout(() => map.invalidateSize(), 50);
});

function updateMap(){
  if (!map) return;
  map.setView([TARGET.lat, TARGET.lon], 13);
  if (marker) {
    marker.setLatLng([TARGET.lat, TARGET.lon]);
  } else {
    marker = L.circleMarker([TARGET.lat, TARGET.lon], { radius: 7, color: '#4fd1c5', fillColor: '#4fd1c5', fillOpacity: 0.9, weight: 2 }).addTo(map);
  }
}

document.getElementById('gpsBtn').addEventListener('click', () => {
  const status = document.getElementById('locStatus');
  if (!navigator.geolocation) {
    status.textContent = 'Geolocation not supported on this device.';
    return;
  }
  status.textContent = 'Getting your location…';
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      TARGET = { lat: pos.coords.latitude, lon: pos.coords.longitude };
      document.getElementById('targetLabel').textContent = `${TARGET.lat.toFixed(5)}, ${TARGET.lon.toFixed(5)}`;
      status.textContent = 'Using your current GPS location.';
      updateMap();
      refresh();
    },
    (err) => { status.textContent = `GPS failed: ${err.message}`; },
    { enableHighAccuracy: true, timeout: 10000 }
  );
});

document.getElementById('setLocBtn').addEventListener('click', async () => {
  const val = document.getElementById('locInput').value.trim();
  const status = document.getElementById('locStatus');
  if (!val) return;

  const coords = parseCoords(val);
  if (coords) {
    TARGET = coords;
    document.getElementById('targetLabel').textContent = `${coords.lat.toFixed(5)}, ${coords.lon.toFixed(5)}`;
    status.textContent = 'Location updated.';
    updateMap();
    refresh();
    return;
  }

  status.textContent = 'Looking up location…';
  try {
    const g = await geocode(val);
    TARGET = { lat: g.lat, lon: g.lon };
    document.getElementById('targetLabel').textContent = `${g.lat.toFixed(5)}, ${g.lon.toFixed(5)}`;
    status.textContent = `Found: ${g.label}`;
    updateMap();
    refresh();
  } catch (e) {
    status.textContent = `Couldn't find that location — try coordinates or a fuller address.`;
  }
});

document.getElementById('locInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('setLocBtn').click();
});

initMap();
refresh();
scheduleAuto();
</script>
</body>
</html>
